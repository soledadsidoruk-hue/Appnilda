<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Noemi Love Rebelde ❤️</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@500&display=swap');

        body {
            /* Fondo azul noche estrellado profundo */
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            font-family: 'Quicksand', sans-serif;
            color: white; margin: 0; min-height: 100vh;
            display: flex; justify-content: center; overflow-x: hidden;
        }

        /* Estrellas brillantes */
        .estrellas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: transparent url('https://www.transparenttextures.com/patterns/stardust.png') repeat;
            opacity: 0.5; z-index: 0; animation: animarFondo 150s linear infinite;
        }

        @keyframes animarFondo {
            from { background-position: 0 0; }
            to { background-position: 1000px 1000px; }
        }

        .contenedor-app {
            position: relative; z-index: 1;
            background: rgba(0, 10, 30, 0.4);
            backdrop-filter: blur(12px);
            width: 100%; max-width: 450px;
            padding: 20px; box-sizing: border-box;
            display: flex; flex-direction: column;
            border-left: 1px solid rgba(255, 133, 162, 0.2);
            border-right: 1px solid rgba(255, 133, 162, 0.2);
        }

        /* HEADER */
        .perfil-header { display: flex; align-items: center; justify-content: flex-end; margin-bottom: 25px; }
        .nombre-usuario h2 { 
            margin: 0; color: #ff85a2; 
            font-family: 'Dancing Script', cursive; 
            font-size: 30px; text-shadow: 0 0 15px #ff1744;
        }

        /* CABALLITO DE MAR CLIMÁTICO */
        .clima-widget {
            display: flex; align-items: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px; border-radius: 25px;
            margin-bottom: 20px; border: 1px solid rgba(126, 200, 255, 0.3);
        }
        .circulo-mar {
            width: 60px; height: 60px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; margin-right: 15px; transition: 1s;
        }
        .sol { background: #ffd600; box-shadow: 0 0 20px #ffd600; color: #5d4037;}
        .nube { background: #90a4ae; box-shadow: 0 0 15px #90a4ae; color: #263238;}
        .lluvia { background: #2979ff; box-shadow: 0 0 20px #2979ff; color: #fff;}

        /* SALMOS DINÁMICOS */
        .seccion-salmo {
            background: rgba(255, 133, 162, 0.1);
            padding: 15px; border-radius: 20px;
            margin-bottom: 20px; border-left: 5px solid #ff4081;
        }
        .salmo-texto { 
            font-family: 'Dancing Script', cursive; 
            color: #ffc1e3; font-size: 22px; display: block; margin-bottom: 5px;
        }

        /* BOTONES DE MENÚ */
        .fila { display: flex; align-items: center; margin-bottom: 15px; text-decoration: none; outline: none; }
        .circulo-icono { 
            width: 60px; height: 60px; border: 2px solid #ff85a2; 
            border-radius: 50%; background: #050a30; z-index: 2; 
            display: flex; align-items: center; justify-content: center; font-size: 25px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }
        .barra-boton { 
            flex-grow: 1; background: linear-gradient(90deg, #c2185b, #000c66); 
            height: 48px; margin-left: -30px; border-radius: 25px; 
            display: flex; align-items: center; padding-left: 45px; 
            color: white; font-weight: bold; font-size: 15px;
            border: 1px solid rgba(255, 133, 162, 0.3);
        }

        .fila:active { transform: scale(0.96); }

        /* GATITOS */
        .foto-gatito {
            width: 100px; height: 100px; border-radius: 20px;
            border: 2px solid #ff85a2; object-fit: cover;
            margin: 10px auto; display: block; cursor: pointer;
        }

        /* DIARIO */
        textarea {
            width: 100%; height: 90px; background: rgba(0,0,0,0.5);
            border: 1px solid #ff85a2; border-radius: 12px;
            color: white; padding: 10px; box-sizing: border-box; font-size: 14px;
        }

        .footer { margin-top: auto; padding: 20px; font-size: 11px; color: #ff85a2; text-align: center; }
    </style>
</head>
<body>

    <div class="estrellas"></div>
    
    <audio id="snd-mario" src="https://www.myinstants.com/media/sounds/super-mario-coin-sound.mp3"></audio>

    <div class="contenedor-app">
        
        <div class="perfil-header">
            <div class="nombre-usuario">
                <h2>❤️ Noemi Love Rebelde ❤️</h2>
                <p style="margin:0; font-size:12px; color:#ff85a2; text-align:right;">Avellaneda 🌙</p>
            </div>
            <div style="width:45px; height:45px; border-radius:50%; border:2px solid #ff85a2; margin-left:10px; display:flex; align-items:center; justify-content:center; background:#050a30;">👩‍⚕️</div>
        </div>

        <div class="clima-widget">
            <div id="mar-box" class="circulo-mar sol">🎠</div>
            <div>
                <p style="margin:0; font-size:11px; color:#ffc1e3;">El clima en Avellaneda</p>
                <div id="temp" style="font-size:20px; font-weight:bold;">Cargando...</div>
            </div>
        </div>

        <img id="img-gatito" src="https://cataas.com/cat/says/Hola%20Noemi" class="foto-gatito" onclick="cambiarGatito()" alt="Gatito">

        <div class="seccion-salmo">
            <span class="salmo-texto" id="salmo-texto">...</span>
            <div id="salmo-expl" style="font-size:13px; color:#e0f2fe;">...</div>
        </div>

        <a href="https://drive.google.com/drive/folders/1aQXWIXgYUtugilQ3FSflZCZKLgCJbMEA" target="_blank" class="fila" onclick="tocar()">
            <div class="circulo-icono">📁</div>
            <div class="barra-boton">MIS ESTUDIOS MÉDICOS</div>
        </a>

        <a href="tel:1141900756" class="fila" onclick="tocar()">
            <div class="circulo-icono">📞</div>
            <div class="barra-boton">LLAMAR SOLE (Movistar)</div>
        </a>

        <a href="tel:1169645447" class="fila" onclick="tocar()">
            <div class="circulo-icono">📱</div>
            <div class="barra-boton">LLAMAR SOLE (Personal)</div>
        </a>

        <div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:20px;">
            <p style="font-family:'Dancing Script'; color:#ff85a2; margin:0 0 10px 0; font-size:22px;">Mi Diario de Novelas 📝</p>
            <textarea id="diario-n"></textarea>
            <button onclick="guardar()" style="width:100%; background:#ff4081; border:none; padding:8px; border-radius:10px; color:white; font-weight:bold; margin-top:5px; cursor:pointer;">Guardar Diario</button>
        </div>

        <div class="footer"> Reina Valera 1960 • Con amor, Sole ✨ </div>
    </div>

    <script>
        function tocar() {
            var audio = document.getElementById('snd-mario');
            audio.currentTime = 0;
            audio.play();
        }

        function cambiarGatito() {
            document.getElementById('img-gatito').src = "https://cataas.com/cat?t=" + new Date().getTime();
            tocar();
        }

        const salmos = [
            { t: "Salmo 23:1", e: "Jehová es mi pastor; nada me faltará. Dios te cuida hoy, Ma." },
            { t: "Salmo 121:1", e: "Mi socorro viene de Jehová. Él te ayuda en todo momento." },
            { t: "Salmo 91:1", e: "El que habita al abrigo del Altísimo morará bajo la sombra del Omnipotente." },
            { t: "Salmo 46:1", e: "Dios es nuestro amparo y fortaleza, nuestro pronto auxilio en las tribulaciones." }
        ];

        function cargarPagina() {
            const s = salmos[Math.floor(Math.random() * salmos.length)];
            document.getElementById('salmo-texto').innerText = s.t;
            document.getElementById('salmo-expl').innerText = s.e;
            document.getElementById('diario-n').value = localStorage.getItem('d_noemi') || "";
            actualizarClima();
        }

        async function actualizarClima() {
            try {
                const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=-34.66&longitude=-58.36&current_weather=true');
                const d = await r.json();
                const temp = Math.round(d.current_weather.temperature);
                const code = d.current_weather.weathercode;
                document.getElementById('temp').innerText = temp + "°C";
                const box = document.getElementById('mar-box');
                if(code <= 3) { box.className = "circulo-mar sol"; box.innerText="🎠"; }
                else if(code >= 51) { box.className = "circulo-mar lluvia"; box.innerText="🌊"; }
                else { box.className = "circulo-mar nube"; box.innerText="☁️"; }
            } catch(e) { document.getElementById('temp').innerText = "22°C"; }
        }

        function guardar() {
            localStorage.setItem('d_noemi', document.getElementById('diario-n').value);
            alert("¡Guardado Ma! ❤️");
            tocar();
        }

        window.onload = cargarPagina;
    </script>
</body>
</html>
